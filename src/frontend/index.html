<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Shop</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#121212',
                        darker: '#0a0a0a',
                        card: '#1e1e1e',
                        primary: '#3b82f6',
                        accent: '#8b5cf6'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #121212; color: #f3f4f6; }
        .glass { background: rgba(30,30,30,0.7); backdrop-filter: blur(10px); }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="glass sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Brand -->
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-8 h-8 rounded bg-gradient-to-br from-primary to-accent flex items-center justify-center text-white font-bold">F</div>
                    <span class="font-bold text-xl tracking-tight text-white">FastAPI Shop</span>
                </div>
                
                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center space-x-6">
                    <a href="#" id="nav-catalog" class="text-gray-300 hover:text-white transition">Каталог</a>
                    
                    <button id="cart-toggle" class="relative text-gray-300 hover:text-white transition flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z"></path></svg>
                        <span id="cart-badge" class="absolute -top-2 -right-2 bg-primary text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
                    </button>

                    <div id="auth-section" class="flex gap-4">
                        <button id="btn-login-modal" class="text-sm px-4 py-2 text-gray-300 hover:text-white transition">Вход</button>
                        <button id="btn-register-modal" class="text-sm px-4 py-2 bg-primary hover:bg-blue-600 text-white rounded-lg transition shadow-lg shadow-blue-500/30">Регистрация</button>
                    </div>

                    <div id="user-section" class="hidden flex items-center gap-4">
                        <span id="user-email" class="text-sm text-gray-400"></span>
                        <button id="btn-logout" class="text-sm px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-lg transition border border-gray-700">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative">
        <!-- Toast Notification -->
        <div id="toast" class="fixed top-20 right-4 z-50 transform transition-all duration-300 translate-x-full opacity-0 bg-card border border-gray-700 rounded-lg p-4 shadow-2xl">
            <p id="toast-message" class="text-white text-sm"></p>
        </div>

        <!-- Catalog View -->
        <section id="view-catalog">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-500">Популярные товары</h1>
                    <p class="text-gray-400 mt-2">Выбирайте лучшее из нашего ассортимента</p>
                </div>
            </div>

            <div id="loading-products" class="flex flex-col items-center py-20 hidden">
                <div class="spinner"></div>
                <p class="mt-4 text-gray-400 text-sm">Загрузка товаров...</p>
            </div>

            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Cards will be injected by JS -->
            </div>
            
            <div id="products-empty" class="text-center py-20 hidden">
                <p class="text-gray-500 text-lg">Товаров пока нет.</p>
            </div>
        </section>
    </main>

    <!-- Cart Overlay -->
    <div id="cart-sidebar" class="fixed inset-y-0 right-0 max-w-sm w-full bg-card border-l border-gray-800 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
            <h2 class="text-xl font-bold text-white">Корзина</h2>
            <button id="cart-close" class="text-gray-400 hover:text-white p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Cart items injected here -->
            <p class="text-gray-500 text-center mt-10" id="cart-empty-text">Ваша корзина пуста</p>
        </div>
        <div class="p-4 border-t border-gray-800 bg-darker">
            <div class="flex justify-between mb-4">
                <span class="text-gray-400">Итого:</span>
                <span id="cart-total" class="font-bold text-white tracking-wide">0 ₽</span>
            </div>
            <button id="btn-checkout" class="w-full py-3 bg-gradient-to-r from-primary to-accent hover:opacity-90 text-white font-bold rounded-lg transition shadow-lg shadow-blue-500/20">
                Оформить заказ
            </button>
        </div>
    </div>

    <!-- Auth Modals -->
    <div id="auth-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-card w-full max-w-md rounded-2xl border border-gray-800 shadow-2xl overflow-hidden relative" id="auth-modal-content">
            <button id="modal-close" class="absolute top-4 right-4 text-gray-500 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div class="p-8">
                <h3 class="text-2xl font-bold text-white mb-2" id="modal-title">Вход</h3>
                <p class="text-gray-400 text-sm mb-6" id="modal-subtitle">Рады видеть вас снова!</p>
                
                <form id="auth-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Email</label>
                        <input type="email" id="auth-email" required class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Пароль</label>
                        <input type="password" id="auth-password" required class="w-full bg-darker border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition">
                    </div>
                    <div id="auth-error" class="hidden text-red-500 text-sm py-1"></div>
                    <button type="submit" id="btn-auth-submit" class="w-full py-2.5 bg-primary hover:bg-blue-600 text-white rounded-lg transition font-medium flex justify-center items-center gap-2">
                        <span>Продолжить</span>
                        <div id="auth-spinner" class="spinner hidden" style="width: 18px; height: 18px; border-width: 2px;"></div>
                    </button>
                </form>
            </div>
            <div class="px-8 py-4 bg-darker border-t border-gray-800 text-center text-sm text-gray-400">
                <span id="modal-switch-text">Нет аккаунта?</span>
                <button type="button" id="btn-switch-auth" class="text-primary hover:text-blue-400 font-medium ml-1">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- Overlay logic -->
    <div id="backdrop" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
